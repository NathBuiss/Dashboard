                        <a href="/admin" class="quick-card fade-in" style="animation-delay:.3s">
                            <div class="qc-icon icon-warning"><i class="fas fa-cogs"></i></div>
                            <div class="qc-title">Administration</div>
                            <div class="qc-desc">Manage dashboard configuration and page visibility</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/static/js/main.js"></script>
        <script>
        async function loadOverviewStats() {
            try {
                const h = {'Authorization': 'Basic ' + btoa('admin:admin123')};
                const [nr, pr, sr] = await Promise.all([
                    fetch('/api/k8s/nodes', {headers: h}),
                    fetch('/api/k8s/pods', {headers: h}),
                    fetch('/api/k8s/services', {headers: h})
                ]);
                if (nr.ok) {
                    const d = await nr.json();
                    document.getElementById('nodeCount').textContent = (d.items||[]).length;
                }
                if (pr.ok) {
                    const d = await pr.json();
                    document.getElementById('podCount').textContent =
                        (d.items||[]).filter(p => p.status && p.status.phase==='Running').length;
                    const ns = new Set((d.items||[]).map(p => p.metadata.namespace)).size;
                    document.getElementById('namespaceCount').textContent = ns;
                }
                if (sr.ok) {
                    const d = await sr.json();
                    document.getElementById('serviceCount').textContent = (d.items||[]).length;
                }
            } catch(e) {
                ['nodeCount','podCount','serviceCount','namespaceCount'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = '?';
                });
            }
        }
        document.addEventListener('DOMContentLoaded', loadOverviewStats);
        </script>
    </body>
    </html>

