    import os
    import yaml
    from pathlib import Path
    from functools import wraps
    from flask import Flask, jsonify, request, send_file
    import requests as http_requests
    from requests.exceptions import RequestException

    CONFIG_PATH = '/config/pages.yaml'
    K8S_TOKEN_PATH = '/var/run/secrets/kubernetes.io/serviceaccount/token'
    K8S_CA_PATH = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'

    DEFAULT_CONFIG = {
        'pages': [
            {'id': 'home', 'title': 'Home', 'path': '/', 'description': 'Main dashboard page', 'icon': 'home', 'enabled': True},
            {'id': 'services', 'title': 'Services', 'path': '/services', 'description': 'Discovered services', 'icon': 'server', 'enabled': True},
            {'id': 'metrics', 'title': 'Metrics', 'path': '/metrics', 'description': 'Cluster metrics', 'icon': 'chart-line', 'enabled': True},
            {'id': 'admin', 'title': 'Admin', 'path': '/admin', 'description': 'Administration panel', 'icon': 'cogs', 'enabled': True},
        ]
    }

    app = Flask(__name__, static_folder='/app/public', static_url_path='/static')


    def load_config():
        try:
            p = Path(CONFIG_PATH)
            if p.exists():
                return yaml.safe_load(p.read_text()) or DEFAULT_CONFIG
            p.parent.mkdir(parents=True, exist_ok=True)
            p.write_text(yaml.dump(DEFAULT_CONFIG))
            return DEFAULT_CONFIG
        except Exception as e:
            app.logger.error('Error loading config: %s', e)
            return DEFAULT_CONFIG


    def save_config(config):
        try:
            Path(CONFIG_PATH).parent.mkdir(parents=True, exist_ok=True)
            Path(CONFIG_PATH).write_text(yaml.dump(config))
            return True
        except Exception as e:
            app.logger.error('Error saving config: %s', e)
            return False


    def require_auth(f):
        @wraps(f)
        def decorated(*args, **kwargs):
            auth = request.authorization
            expected_user = os.environ.get('ADMIN_USERNAME', 'admin')
            expected_pass = os.environ.get('ADMIN_PASSWORD', 'admin123')
            if not auth or auth.username != expected_user or auth.password != expected_pass:
                return jsonify({'error': 'Authentication required'}), 401, {
                    'WWW-Authenticate': 'Basic realm="Admin"'
                }
            return f(*args, **kwargs)
        return decorated


    @app.route('/')
    def index():
        return send_file('/app/views/index.html')


    @app.route('/services')
    def services():
        return send_file('/app/views/services.html')


    @app.route('/metrics')
    def metrics_page():
        return send_file('/app/views/metrics.html')


    @app.route('/admin')
    def admin():
        return send_file('/app/views/admin.html')


    @app.route('/api/pages', methods=['GET'])
    def get_pages():
        return jsonify(load_config())


    @app.route('/api/pages', methods=['POST'])
    @require_auth
    def post_pages():
        data = request.get_json()
        if not data or not isinstance(data.get('pages'), list):
            return jsonify({'error': 'Invalid configuration format'}), 400
        if save_config(data):
            return jsonify({'success': True, 'message': 'Configuration updated successfully'})
        return jsonify({'error': 'Failed to save configuration'}), 500


    @app.route('/api/k8s/<path:endpoint>', methods=['GET'])
    @require_auth
    def k8s_proxy(endpoint):
        try:
            host = os.environ.get('KUBERNETES_SERVICE_HOST', 'kubernetes.default.svc')
            port = os.environ.get('KUBERNETES_SERVICE_PORT', '443')
            token = Path(K8S_TOKEN_PATH).read_text().strip()
            url = 'https://{}:{}/api/v1/{}'.format(host, port, endpoint)
            resp = http_requests.get(
                url,
                headers={'Authorization': 'Bearer ' + token, 'Accept': 'application/json'},
                verify=K8S_CA_PATH,
                timeout=10,
            )
            return jsonify(resp.json()), resp.status_code
        except RequestException as e:
            app.logger.error('Kubernetes API error: %s', e)
            return jsonify({'error': 'Failed to connect to Kubernetes API', 'details': str(e)}), 502


    @app.errorhandler(404)
    def not_found(e):
        return 'Page not found', 404


    @app.errorhandler(500)
    def server_error(e):
        return 'Internal server error', 500


    if __name__ == '__main__':
        port = int(os.environ.get('PORT', 3000))
        app.logger.info('Dashboard server starting on port %d', port)
        app.run(host='0.0.0.0', port=port)

