{{- $fullName := include "tools-dashboard.fullname" . -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-app-files
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tools-dashboard.labels" . | nindent 4 }}
data:
  package.json: |
    {
      "name": "tools-dashboard",
      "version": "1.0.0",
      "dependencies": {
        "express": "^4.18.0",
        "js-yaml": "^4.1.0",
        "axios": "^1.3.0"
      }
    }

  server.js: |
    const express = require('express');
    const path = require('path');
    const fs = require('fs');
    const yaml = require('js-yaml');
    const axios = require('axios');

    const configPath = '/config/pages.yaml';
    const dataPath = '/data/metrics.json';

    if (!fs.existsSync('/config')) {
      fs.mkdirSync('/config', { recursive: true });
    }

    if (!fs.existsSync('/data')) {
      fs.mkdirSync('/data', { recursive: true });
    }

    const defaultConfig = {
      pages: [
        { id: 'home', title: 'Home', path: '/', description: 'Main dashboard page', icon: 'home', enabled: true },
        { id: 'services', title: 'Services', path: '/services', description: 'Discovered services', icon: 'server', enabled: true },
        { id: 'metrics', title: 'Metrics', path: '/metrics', description: 'Cluster metrics', icon: 'chart-line', enabled: true },
        { id: 'admin', title: 'Admin', path: '/admin', description: 'Administration panel', icon: 'cogs', enabled: true }
      ]
    };

    function loadConfig() {
      try {
        if (fs.existsSync(configPath)) {
          return yaml.load(fs.readFileSync(configPath, 'utf8'));
        }
        fs.writeFileSync(configPath, yaml.dump(defaultConfig));
        return defaultConfig;
      } catch (error) {
        console.error('Error loading config:', error);
        return defaultConfig;
      }
    }

    function saveConfig(config) {
      try {
        fs.writeFileSync(configPath, yaml.dump(config));
        return true;
      } catch (error) {
        console.error('Error saving config:', error);
        return false;
      }
    }

    const app = express();
    const PORT = process.env.PORT || 3000;

    app.use(express.json());
    app.use(express.urlencoded({ extended: true }));
    app.use('/static', express.static(path.join(__dirname, 'public')));

    function authenticate(req, res, next) {
      const auth = req.headers.authorization;
      if (!auth) {
        return res.status(401).json({ error: 'Authentication required' });
      }

      const [type, credentials] = auth.split(' ');
      if (type !== 'Basic') {
        return res.status(401).json({ error: 'Authentication required' });
      }

      const [username, password] = Buffer.from(credentials, 'base64').toString().split(':');
      const expectedUsername = process.env.ADMIN_USERNAME || 'admin';
      const expectedPassword = process.env.ADMIN_PASSWORD || 'admin123';

      if (username === expectedUsername && password === expectedPassword) {
        next();
      } else {
        res.set('WWW-Authenticate', 'Basic realm="Admin"');
        return res.status(401).json({ error: 'Invalid credentials' });
      }
    }

    app.get('/', (req, res) => res.sendFile(path.join(__dirname, 'views', 'index.html')));
    app.get('/services', (req, res) => res.sendFile(path.join(__dirname, 'views', 'services.html')));
    app.get('/metrics', (req, res) => res.sendFile(path.join(__dirname, 'views', 'metrics.html')));
    app.get('/admin', (req, res) => res.sendFile(path.join(__dirname, 'views', 'admin.html')));

    app.get('/api/pages', (req, res) => {
      try {
        res.json(loadConfig());
      } catch (error) {
        res.status(500).json({ error: 'Failed to load configuration' });
      }
    });

    app.post('/api/pages', authenticate, (req, res) => {
      try {
        const newConfig = req.body;
        if (!newConfig || !Array.isArray(newConfig.pages)) {
          return res.status(400).json({ error: 'Invalid configuration format' });
        }
        if (saveConfig(newConfig)) {
          res.json({ success: true, message: 'Configuration updated successfully' });
        } else {
          res.status(500).json({ error: 'Failed to save configuration' });
        }
      } catch (error) {
        console.error('Error updating pages:', error);
        res.status(500).json({ error: 'Internal server error' });
      }
    });

    app.get('/api/k8s/:endpoint(*)', authenticate, async (req, res) => {
      try {
        const apiUrl = `https://${process.env.KUBERNETES_SERVICE_HOST}:${process.env.KUBERNETES_SERVICE_PORT}/api/v1/${req.params.endpoint}`;
        const response = await axios.get(apiUrl, {
          httpsAgent: new (require('https')).Agent({
            ca: fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'),
            rejectUnauthorized: true
          }),
          headers: {
            'Authorization': `Bearer ${fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8')}`,
            'Accept': 'application/json'
          }
        });
        res.json(response.data);
      } catch (error) {
        console.error('Kubernetes API error:', error.message);
        res.status(error.response?.status || 500).json({
          error: 'Failed to connect to Kubernetes API',
          details: error.message
        });
      }
    });

    app.use((req, res) => res.status(404).send('Page not found'));

    app.use((err, req, res, next) => {
      console.error(err.stack);
      res.status(500).send('Something broke!');
    });

    app.listen(PORT, () => {
      console.log(`Dashboard server running on port ${PORT}`);
    });

