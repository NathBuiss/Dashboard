apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tools-dashboard.fullname" . }}-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tools-dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tools-dashboard.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "tools-dashboard.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}